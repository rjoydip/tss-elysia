version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - DATABASE_NAME=.artifacts/tss-elysia.db
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=development
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-min-32-characters-long}
      - DATABASE_NAME=.artifacts/tss-elysia.db
    volumes:
      - .:/app
      - bun-cache:/root/.bun
    command: bun run dev
    restart: on-failure

volumes:
  db-data:
  bun-cache:
