# =============================================================================
# Docker Compose - Optimized for development and production
# =============================================================================
# Usage:
#   Production: docker-compose up app
#   Development: docker-compose up dev
#   With replicas: docker-compose up -f docker-compose.yml -f docker-compose.replicas.yml up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis Service — Cache, Pub/Sub, and session storage
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tsse-elysia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # PostgreSQL Primary (Write) Service
  # ---------------------------------------------------------------------------
  postgres-primary:
    image: postgres:16-alpine
    container_name: tsse-elysia-postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tsse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tsse_password}
      POSTGRES_DB: ${POSTGRES_DB:-tsse_dev}
      POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env:
      - POSTGRES_USER=${POSTGRES_USER:-tsse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tsse_password}
      - POSTGRES_DB=${POSTGRES_DB:-tsse_dev}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tsse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB

  # ---------------------------------------------------------------------------
  # PostgreSQL Read Replica 1
  # ---------------------------------------------------------------------------
  postgres-replica-1:
    image: postgres:16-alpine
    container_name: tsse-elysia-postgres-replica-1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tsse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tsse_password}
      POSTGRES_DB: ${POSTGRES_DB:-tsse_dev}
    ports:
      - "${POSTGRES_REPLICA_1_PORT:-5433}:5432"
    env:
      - POSTGRES_USER=${POSTGRES_USER:-tsse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tsse_password}
      - POSTGRES_DB=${POSTGRES_DB:-tsse_dev}
    volumes:
      - postgres_replica_1_data:/var/lib/postgresql/data
    restart: unless-stopped
    depends_on:
      - postgres-primary
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tsse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=64MB
      -c hot_standby=on
      -c hot_standby_feedback=on

  # ---------------------------------------------------------------------------
  # PostgreSQL Read Replica 2
  # ---------------------------------------------------------------------------
  postgres-replica-2:
    image: postgres:16-alpine
    container_name: tsse-elysia-postgres-replica-2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tsse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tsse_password}
      POSTGRES_DB: ${POSTGRES_DB:-tsse_dev}
    ports:
      - "${POSTGRES_REPLICA_2_PORT:-5434}:5432"
    env:
      - POSTGRES_USER=${POSTGRES_USER:-tsse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tsse_password}
      - POSTGRES_DB=${POSTGRES_DB:-tsse_dev}
    volumes:
      - postgres_replica_2_data:/var/lib/postgresql/data
    restart: unless-stopped
    depends_on:
      - postgres-primary
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tsse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=64MB
      -c hot_standby=on
      -c hot_standby_feedback=on

  # ---------------------------------------------------------------------------
  # Production Service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tsse-elysia-prod
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      # Required: Generate a secure secret (min 32 chars)
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - DATABASE_PATH=.artifacts
      - DATABASE_NAME=tsse-elysia.db
      # PostgreSQL primary connection
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-tsse}:${POSTGRES_PASSWORD:-tsse_password}@postgres-primary:5432/${POSTGRES_DB:-tsse_dev}
      # PostgreSQL read replicas (JSON array format)
      - POSTGRES_REPLICAS=["postgresql://${POSTGRES_USER:-tsse}:${POSTGRES_PASSWORD:-tsse_password}@postgres-replica-1:5432/${POSTGRES_DB:-tsse_dev}","postgresql://${POSTGRES_USER:-tsse}:${POSTGRES_PASSWORD:-tsse_password}@postgres-replica-2:5432/${POSTGRES_DB:-tsse_dev}"]
      # Redis connection (uses Docker service name for internal networking)
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    volumes:
      - app-data:/app/.artifacts
    # Resource limits (adjust based on needs)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Restart policy
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Development Service
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: tsse-elysia-dev
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=development
      # Dev secret (auto-generated if not provided)
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-min-32-chars-here}
      - DATABASE_PATH=.artifacts
      - DATABASE_NAME=tsse-elysia.db
      # PostgreSQL primary connection
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-tsse}:${POSTGRES_PASSWORD:-tsse_password}@postgres-primary:5432/${POSTGRES_DB:-tsse_dev}
      # PostgreSQL read replicas (JSON array format)
      - POSTGRES_REPLICAS=["postgresql://${POSTGRES_USER:-tsse}:${POSTGRES_PASSWORD:-tsse_password}@postgres-replica-1:5432/${POSTGRES_DB:-tsse_dev}","postgresql://${POSTGRES_USER:-tsse}:${POSTGRES_PASSWORD:-tsse_password}@postgres-replica-2:5432/${POSTGRES_DB:-tsse_dev}"]
      # Redis connection (uses Docker service name for internal networking)
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    volumes:
      # Mount source code for hot reload
      - ..:/app
      # Bun cache for faster builds
      - bun-cache:/root/.bun
      # Node modules (avoid reinstalling)
      - node-modules:/app/node_modules
    # Restart on failure (useful for development)
    restart: on-failure
    # Development-specific settings
    stdin_open: true
    tty: true
    # Logging (development - more verbose)
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# =============================================================================
# Volumes - Named volumes for data persistence
# =============================================================================
volumes:
  # Production database data
  app-data:
    driver: local
  # Bun package cache (speeds up rebuilds)
  bun-cache:
    driver: local
  # Node modules (avoid reinstalling on every rebuild)
  node-modules:
    driver: local
  # Redis data persistence
  redis-data:
    driver: local
  # PostgreSQL primary data persistence
  postgres_primary_data:
    driver: local
  # PostgreSQL replica 1 data persistence
  postgres_replica_1_data:
    driver: local
  # PostgreSQL replica 2 data persistence
  postgres_replica_2_data:
    driver: local