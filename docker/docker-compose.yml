# =============================================================================
# Docker Compose - Optimized for development and production
# =============================================================================
# Usage:
#   Production: docker-compose up app
#   Development: docker-compose up dev
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Production Service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tss-elysia-prod
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      # Required: Generate a secure secret (min 32 chars)
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - DATABASE_PATH=.artifacts
      - DATABASE_NAME=tss-elysia.db
    volumes:
      - app-data:/app/.artifacts
    # Resource limits (adjust based on needs)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Restart policy
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Development Service
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: tss-elysia-dev
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=development
      # Dev secret (auto-generated if not provided)
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-min-32-chars-here}
      - DATABASE_PATH=.artifacts
      - DATABASE_NAME=tss-elysia.db
    volumes:
      # Mount source code for hot reload
      - ..:/app
      # Bun cache for faster builds
      - bun-cache:/root/.bun
      # Node modules (avoid reinstalling)
      - node-modules:/app/node_modules
    # Restart on failure (useful for development)
    restart: on-failure
    # Development-specific settings
    stdin_open: true
    tty: true
    # Logging (development - more verbose)
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# =============================================================================
# Volumes - Named volumes for data persistence
# =============================================================================
volumes:
  # Production database data
  app-data:
    driver: local
  # Bun package cache (speeds up rebuilds)
  bun-cache:
    driver: local
  # Node modules (avoid reinstalling on every rebuild)
  node-modules:
    driver: local