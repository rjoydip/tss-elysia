# =============================================================================
# Redis Configuration for tss-elysia
# Optimized for development with Pub/Sub support and persistence
# =============================================================================

# Network — accept connections from all interfaces (Docker networking)
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory — limit usage and evict least-recently-used keys when full
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — RDB snapshots for periodic backups
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data
rdbcompression yes

# Append-Only File (AOF) — better durability than RDB alone
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Pub/Sub — buffer limits for slow subscribers
# Format: client-output-buffer-limit <class> <hard limit> <soft limit> <soft seconds>
# Disconnect subscribers that accumulate >32MB or >8MB for >60s
client-output-buffer-limit pubsub 32mb 8mb 60

# Logging — notice level for meaningful logs without noise
loglevel notice
logfile ""

# Security — no password for local dev; override via REDIS_URL for production
# requirepass your-password-here
