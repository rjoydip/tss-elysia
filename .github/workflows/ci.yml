name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_INSTALL_CACHE_DIR: ~/.bun-install-cache
  DATABASE_PATH: ".artifacts"
  DATABASE_NAME: "tss-elysia.db"
  DATABASE_TYPE: "sqlite"
  CI: "true"
  E2E_HOST: "localhost"
  E2E_PORT: "4173"
  BETTER_AUTH_SECRET: "test-secret-min-32-chars-for-ci"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-

      - name: Install dependencies
        run: bun install ${{ github.actor == 'dependabot[bot]' && '' || '--frozen-lockfile' }} --ignore-scripts

      - name: Run Linters
        run: bun run lint:ci

      - name: Run type checking
        run: bun run typecheck

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-

      - name: Install dependencies
        run: bun install ${{ github.actor == 'dependabot[bot]' && '' || '--frozen-lockfile' }} --ignore-scripts

      - name: Run security audit
        run: bun audit --audit-level=critical

  test:
    name: Tests & Build (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: bun
            build_cmd: build
            artifact_name: server-bun
            artifact_path: dist
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-

      - name: Install dependencies
        run: bun install ${{ github.actor == 'dependabot[bot]' && '' || '--frozen-lockfile' }} --ignore-scripts

      - name: Install node-gyp
        run: bun install -g node-gyp

      - name: Install better-sqlite3
        run: cd node_modules/better-sqlite3 && bun run build-release

      - name: Run database setup
        run: bun run db:setup

      - name: Run tests (${{ matrix.runtime }})
        run: bun test

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build (${{ matrix.runtime }})
        run: bun run ${{ matrix.build_cmd }}

      - name: Resolve host IP
        run: |
          HOST_IP=$(ip route get 1.1.1.1 | awk '{for(i=1;i<=NF;i++) if($i=="src") print $(i+1)}')
          echo "E2E_HOST=$HOST_IP" >> $GITHUB_ENV
          echo "E2E_BASE_URL=http://$HOST_IP:$E2E_PORT" >> $GITHUB_ENV
          echo "BETTER_AUTH_URL=http://$HOST_IP:$E2E_PORT/api/auth" >> $GITHUB_ENV
          echo "Resolved host IP: $HOST_IP"

      - name: Start preview server
        run: |
          bun run preview --port $E2E_PORT --host $E2E_HOST &
          for i in $(seq 1 30); do
            if curl -sf http://$E2E_HOST:$E2E_PORT > /dev/null 2>&1; then
              echo "Server http://$E2E_HOST:$E2E_PORT is ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        run: bun run test:e2e --project=chromium

      - name: Upload ${{ matrix.artifact_name }} artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

      - name: Cleanup database
        if: always()
        run: bun run scripts/remove-db.ts

  docker-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: tss-elysia:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "tss-elysia:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan for malware
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "tss-elysia:${{ github.sha }}"
          scanner: "malware"
          format: "table"
          exit-code: "1"