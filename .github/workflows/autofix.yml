name: Auto-fix

# Required GitHub Secrets (set in repository settings -> Secrets and variables -> Actions):
#   GH_USER_EMAIL - Email for git config (fallback: github-actions[bot]@users.noreply.github.com)
#   GH_USER_NAME  - Name for git config (fallback: github-actions[bot])

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".github/workflows/*.yml"
  workflow_dispatch:

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Auto-fix Lint Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.email "${{ secrets.GH_USER_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"
          git config --global user.name "${{ secrets.GH_USER_NAME || 'github-actions[bot]' }}"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun-install-cache
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-

      - name: Install dependencies
        run: bun install ${{ github.actor == 'dependabot[bot]' && '' || '--frozen-lockfile' }}

      - name: Check for dependency updates
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bunx actions-up --dry-run

      - name: Run auto-fix
        run: bun run lint:fix

      - name: Create commit
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: apply automated lint fixes"
          file_pattern: "*.ts *.tsx *.js *.json *.css *.scss"