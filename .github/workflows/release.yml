name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_INSTALL_CACHE_DIR: ~/.bun-install-cache

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-deps-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality checks
        run: |
          bun run lint
          bun run typecheck
          bun test

      - name: Build Bun binary
        run: bun run build:bun

      - name: Create production release
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: bun run release
          commit-message: "chore: release version ${ changeset_changes_sha }"
          title: "chore: release version ${ changeset_changes_sha }"
          createGitHubReleases: true
          setupGitHubForNPM: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
